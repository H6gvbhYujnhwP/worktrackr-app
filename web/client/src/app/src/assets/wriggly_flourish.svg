<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 120" width="1440" height="120" fill="none">
  <defs>
    <!-- Radial glow left -->
    <radialGradient id="glowLeft" cx="15%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <!-- Radial glow right -->
    <radialGradient id="glowRight" cx="85%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <!-- Filament glow filter -->
    <filter id="filamentGlow" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-10%" y="-100%" width="120%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background radial glows -->
  <rect width="1440" height="120" fill="url(#glowLeft)"/>
  <rect width="1440" height="120" fill="url(#glowRight)"/>

  <!-- LEFT SIDE — filaments sweeping in from top-left and bottom-left corners -->
  <!-- Thick core filaments -->
  <path d="M0,0 C40,8 80,20 160,35 S280,55 380,58" stroke="#fbbf24" stroke-width="1.8" opacity="0.9" filter="url(#filamentGlow)"/>
  <path d="M0,5 C50,15 100,28 180,42 S300,60 400,62" stroke="#f59e0b" stroke-width="1.4" opacity="0.75" filter="url(#filamentGlow)"/>
  <path d="M0,0 C30,12 70,30 140,48 S240,68 320,70" stroke="#fbbf24" stroke-width="1.0" opacity="0.6" filter="url(#filamentGlow)"/>
  <!-- Bottom-left sweeps -->
  <path d="M0,120 C45,105 90,88 170,72 S290,55 390,52" stroke="#f59e0b" stroke-width="1.6" opacity="0.85" filter="url(#filamentGlow)"/>
  <path d="M0,115 C55,100 110,82 190,66 S310,50 410,48" stroke="#fbbf24" stroke-width="1.2" opacity="0.65" filter="url(#filamentGlow)"/>
  <path d="M0,120 C35,108 75,92 150,78 S260,62 350,60" stroke="#f59e0b" stroke-width="0.8" opacity="0.5" filter="url(#filamentGlow)"/>
  <!-- Wispy tendrils left -->
  <path d="M0,2 C20,18 45,40 90,55 S160,72 220,74" stroke="#fde68a" stroke-width="0.6" opacity="0.45"/>
  <path d="M0,8 C25,22 55,44 100,58 S175,74 240,76" stroke="#fde68a" stroke-width="0.5" opacity="0.35"/>
  <path d="M0,118 C22,104 48,84 95,68 S168,52 228,50" stroke="#fde68a" stroke-width="0.6" opacity="0.4"/>

  <!-- RIGHT SIDE — filaments sweeping in from top-right and bottom-right corners (mirrored) -->
  <path d="M1440,0 C1400,8 1360,20 1280,35 S1160,55 1060,58" stroke="#fbbf24" stroke-width="1.8" opacity="0.9" filter="url(#filamentGlow)"/>
  <path d="M1440,5 C1390,15 1340,28 1260,42 S1140,60 1040,62" stroke="#f59e0b" stroke-width="1.4" opacity="0.75" filter="url(#filamentGlow)"/>
  <path d="M1440,0 C1410,12 1370,30 1300,48 S1200,68 1120,70" stroke="#fbbf24" stroke-width="1.0" opacity="0.6" filter="url(#filamentGlow)"/>
  <!-- Bottom-right sweeps -->
  <path d="M1440,120 C1395,105 1350,88 1270,72 S1150,55 1050,52" stroke="#f59e0b" stroke-width="1.6" opacity="0.85" filter="url(#filamentGlow)"/>
  <path d="M1440,115 C1385,100 1330,82 1250,66 S1130,50 1030,48" stroke="#fbbf24" stroke-width="1.2" opacity="0.65" filter="url(#filamentGlow)"/>
  <path d="M1440,120 C1405,108 1365,92 1290,78 S1180,62 1090,60" stroke="#f59e0b" stroke-width="0.8" opacity="0.5" filter="url(#filamentGlow)"/>
  <!-- Wispy tendrils right -->
  <path d="M1440,2 C1420,18 1395,40 1350,55 S1280,72 1220,74" stroke="#fde68a" stroke-width="0.6" opacity="0.45"/>
  <path d="M1440,8 C1415,22 1385,44 1340,58 S1265,74 1200,76" stroke="#fde68a" stroke-width="0.5" opacity="0.35"/>
  <path d="M1440,118 C1418,104 1392,84 1345,68 S1272,52 1212,50" stroke="#fde68a" stroke-width="0.6" opacity="0.4"/>

  <!-- Gold hairline border top and bottom -->
  <line x1="0" y1="0.5" x2="1440" y2="0.5" stroke="#f59e0b" stroke-width="0.75" opacity="0.5"/>
  <line x1="0" y1="119.5" x2="1440" y2="119.5" stroke="#f59e0b" stroke-width="0.75" opacity="0.5"/>
</svg>
